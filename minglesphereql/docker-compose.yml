services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: minglesphereql-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: minglesphereql
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: minglesphereql-admin
    profiles: [admin]
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@minglesphereql.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data:
